name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-format:
    name: Lint + format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Check formatting (ruff format --check)
        run: ruff format --check src/ tests/ scripts/

      - name: Lint (ruff check)
        run: ruff check src/ tests/ scripts/

  type-check:
    name: Type check (mypy strict on src/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "mypy>=1.9" "pandas-stubs" "types-PyYAML"
          pip install -e .

      - name: mypy strict on src/
        run: mypy --strict src/dnamrnaseq2026/

  smoke-tests:
    name: Pytest smoke tests (synthetic fixtures, no OneDrive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install "pytest>=8.0" "pandas>=2.0" "numpy>=1.26" \
                      "scipy>=1.11" "pyyaml>=6.0" "pyreadr>=0.5"
          pip install -e .

      - name: Run smoke tests
        run: pytest tests/ -v --tb=short
        timeout-minutes: 5
