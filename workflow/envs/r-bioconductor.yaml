name: dnamrnaseq2026-r-bioc
# Canonical R-Bioconductor conda env for dnamrnaseq-2026.
# Full spec lives at envs/r-bioc.yml (repo root).
# This file is a pointer for Snakemake --use-conda; it references the same
# environment by name. Snakemake resolves --use-conda envs relative to the
# Snakefile location; this file lives alongside the .smk rules for convenience.
#
# IMPORTANT: To avoid env duplication, this file is kept minimal. The
# authoritative pinned spec is envs/r-bioc.yml. If you add packages, add
# them to envs/r-bioc.yml; the solver pins there are the ground truth.
#
# CellDMC note: there is no separate bioconductor-celldmc package on bioconda.
# CellDMC() is an exported function inside EpiDISH. Installing bioconductor-epidish
# is sufficient to access CellDMC().
#
# Bioconductor version: 3.17 (r43 build suffix). Bioc 3.18 requires r-base=4.4
# on bioconda; we pin to 4.3 for stability.
#
# Dry-run solve verified: 2026-05-17, linux-64, libmamba solver, no conflicts.
# 2026-05-21: bioconductor-limma pinned 3.56.0 -> 3.56.2 (3.56.0 not in bioconda; 3.56.2 is).

channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  - r-base=4.3
  - bioconductor-epidish=2.16.0
  - bioconductor-mcsea=1.20.0
  - bioconductor-methylclock=1.6.0
  - bioconductor-methylclockdata=1.8.1
  - bioconductor-decoupler=2.6.0
  - bioconductor-limma=3.56.2
  # r-dplyr replaces r-tidyverse meta-package: only dplyr is called by the
  # R scripts (run_celldmc.R). The meta-package risks a r-base>=4.4 pull
  # on future solves, conflicting with the 4.3 pin here.
  # KEEP IN SYNC with envs/r-bioc.yml (canonical spec at repo root).
  - r-dplyr
  - r-yaml
  - r-optparse
  # Arrow parquet I/O (required by run_epidish.R and run_celldmc.R).
  # KEEP IN SYNC with envs/r-bioc.yml.
  - r-arrow
